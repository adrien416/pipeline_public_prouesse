# ============================================================
# Configuration du pipeline de prospection outbound
# Seule interface pour modifier les critères — jamais hardcodé
# ============================================================

# Mode de prospection : "levee_de_fonds" ou "cession"
mode: "levee_de_fonds"

# --- Filtres entreprises ---
secteurs_inclus:
  - "impact"
  - "ESG"
  - "fintech"
  - "greentech"
  - "edtech"

secteurs_exclus:
  - "casino"
  - "tabac"
  - "défense"

taille_min: 10
taille_max: 500
pays:
  - "France"

# Score minimum pour passer au scoring (sur 10)
score_minimum: 7

# --- Filtres dirigeants ---
titre_cibles:
  - "CEO"
  - "DG"
  - "Directeur Général"
  - "Associé"
  - "Directeur Investissement"

# --- Signaux d'intention (par mode) ---
signaux_intention:
  levee_de_fonds:
    - "Recrutements exécutifs récents (CTO, CFO, VP Sales)"
    - "Pic d'offres d'emploi (phase de croissance)"
    - "Lancement de nouveaux produits"
    - "Expansion géographique ou nouveau marché"
    - "Changements réglementaires favorables"
    - "Concurrents ayant récemment levé"
    - "Temps depuis le dernier tour de financement"
    - "Croissance du headcount significative"
  cession:
    - "Fondateur en fin de carrière ou désengagement"
    - "Croissance en déclin"
    - "Consolidation du marché"
    - "Intérêt du Private Equity dans le secteur"
    - "Absence de plan de succession clair"
    - "Stagnation des recrutements"

# --- Paramètres d'envoi HubSpot ---
envoi_par_jour: 15
delai_entre_emails_min: 180
delai_entre_emails_max: 420
heure_debut_envoi: "09:00"
heure_fin_envoi: "17:30"
hubspot_owner_id: "87316613"

# --- Limites et coûts ---
limites:
  # Fullenrich
  fullenrich_credits_max_par_mois: 500      # Plan Starter = 500 crédits/mois
  fullenrich_credits_alerte_seuil: 50        # Alerte quand < 50 crédits restants
  fullenrich_cout_par_credit_eur: 0.058      # 29€ / 500 crédits

  # IA (Claude Haiku) — scoring + génération emails
  haiku_max_appels_par_jour: 200             # Limite quotidienne d'appels Haiku
  haiku_cout_input_par_mtok_eur: 0.001       # $0.001/1K input tokens (~0.001€)
  haiku_cout_output_par_mtok_eur: 0.005      # $0.005/1K output tokens (~0.005€)
  haiku_tokens_moyens_par_appel: 800         # Estimation tokens par scoring/email

  # HubSpot
  hubspot_emails_max_par_jour: 50            # Limite raisonnable (Starter = 500/jour)
